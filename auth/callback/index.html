<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLAYO – App öffnen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #f5f3ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }
    .logo { font-size: 32px; font-weight: 900; color: #1a1a2e; margin-bottom: 32px; }
    .logo span { color: #f97316; }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(124,58,237,0.10);
      border: 1px solid #ede9f6;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #ede9f6;
      border-top-color: #4c2d9e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 18px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
    p { font-size: 14px; color: #6b7280; line-height: 1.5; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: #4c2d9e;
      color: white;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 12px;
      cursor: pointer;
      border: none;
      width: 100%;
    }
    #manual { display: none; }
  </style>
</head>
<body>
  <div class="logo">PLAY<span>O</span></div>

  <div class="card" id="auto">
    <div class="spinner"></div>
    <h2>App wird geöffnet…</h2>
    <p>Du wirst automatisch zur PLAYO App weitergeleitet.</p>
  </div>

  <div class="card" id="manual">
    <h2>Fast fertig!</h2>
    <p>Tippe auf den Button um die PLAYO App zu öffnen und dein Passwort zurückzusetzen.</p>
    <a class="btn" id="openBtn" href="#">PLAYO App öffnen</a>
  </div>

  <script>
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const type = params.get('type');
    const scheme = type === 'recovery' ? 'ch.playo.app://reset-password' : 'ch.playo.app://callback';
    const deepLink = scheme + '#' + hash;

    // Versuche automatisch zu öffnen
    window.location = deepLink;

    // Nach 1.5s: zeige manuellen Button falls App nicht geöffnet wurde
    setTimeout(() => {
      document.getElementById('auto').style.display = 'none';
      document.getElementById('manual').style.display = 'block';
      document.getElementById('openBtn').href = deepLink;
    }, 1500);
  </script>
</body>
</html>
