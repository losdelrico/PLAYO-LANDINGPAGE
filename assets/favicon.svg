<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Full-bleed background, no rounded corners — browser/Google handles circular crop -->
  <rect width="192" height="192" fill="#3D1A8E"/>

  <!-- Decorative background circles (subtle) -->
  <circle cx="40" cy="50" r="22" fill="none" stroke="#5B2DB8" stroke-width="4" opacity="0.6"/>
  <circle cx="152" cy="45" r="15" fill="none" stroke="#5B2DB8" stroke-width="3" opacity="0.5"/>
  <circle cx="160" cy="145" r="20" fill="none" stroke="#5B2DB8" stroke-width="4" opacity="0.4"/>
  <circle cx="30" cy="155" r="12" fill="none" stroke="#5B2DB8" stroke-width="3" opacity="0.5"/>

  <!-- Orange O — centered, fills the space well -->
  <text
    x="96"
    y="130"
    font-family="Arial Black, Arial, sans-serif"
    font-size="110"
    font-weight="900"
    text-anchor="middle"
    fill="#F97316"
    letter-spacing="-2"
  >O</text>
</svg>
